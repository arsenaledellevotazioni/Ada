<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0a0d">
    <title>Risultati Live - Arsenale delle Apparizioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Special+Elite&family=Roboto:wght@400;700&display=swap');

        :root{
            --bg: #0b0a0d;
            --paper: #f1e6c8;
            --paper-edge: #d8c79e;
            --ink: #1b1812;
            --gold: #c89b3c;
            --gold-soft: rgba(200,155,60,0.35);
            --blue: #2f6fed;
            --blue-deep: #1c4fc2;
            --red: #e2384a;
            --red-deep: #b41f30;
            --cream: #f3ece0;
            --muted: #9b9384;
        }

        *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body{
            margin:0;
            padding:0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background:
                radial-gradient(ellipse 70% 40% at 50% 0%, rgba(200,155,60,0.10), transparent 60%),
                #0b0a0d;
            color: var(--cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px 0;
        }

        #container {
            width: 95%;
            max-width: 880px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* STAMP FRAME FOR LOGO */
        .stamp-frame{
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: var(--paper);
            border: 3px solid var(--gold);
            box-shadow:
                0 0 0 5px var(--bg),
                0 0 0 7px var(--gold-soft),
                0 8px 20px rgba(0,0,0,0.55);
            display:flex;
            align-items:center;
            justify-content:center;
            padding: 5px;
            margin-bottom: 18px;
        }
        .stamp-frame img{
            width: 100%;
            height: 100%;
            object-fit: contain;
            display:block;
        }

        #title {
            font-family: 'Anton', sans-serif;
            font-size: 52px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 18px rgba(255,255,255,0.2);
            margin: 8px 0 6px;
            white-space: nowrap;
        }

        #subtitle {
            display:flex;
            align-items:center;
            gap: 10px;
            font-family: 'Special Elite', monospace;
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0 0 44px;
        }

        .live-dot{
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 8px rgba(226,56,74,0.8);
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse{
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* SCOREBOARD PANEL */
        .scoreboard{
            width: 100%;
            background: linear-gradient(180deg, #18141b, #100e12);
            border-radius: 22px;
            border: 1px solid rgba(200,155,60,0.25);
            padding: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        /* marquee bulb strip */
        .marquee{
            height: 10px;
            border-radius: 8px;
            margin-bottom: 18px;
            background-image: radial-gradient(circle, var(--gold) 0 2.5px, transparent 3px);
            background-size: 22px 10px;
            background-repeat: repeat-x;
            background-position: center;
            opacity: 0.85;
            animation: twinkle 2.4s linear infinite;
        }

        @media (prefers-reduced-motion: reduce){
            .marquee, .live-dot{ animation: none; }
        }

        @keyframes twinkle{
            0% { background-position: 0 center; }
            100% { background-position: 44px center; }
        }

        #results-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
            padding: 10px 16px 16px;
        }

        .result-bar-group {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.035);
            padding: 22px 26px;
            border-radius: 14px;
            box-sizing: border-box;
        }

        .label {
            font-family: 'Anton', sans-serif;
            font-size: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 0 0 210px;
            text-align: left;
        }

        .bar-wrapper {
            flex: 1;
            height: 46px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 23px;
            overflow: hidden;
            margin: 0 22px;
            position: relative;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.55);
        }

        .bar {
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 23px;
        }

        .label-a { color: var(--blue); text-shadow: 0 0 12px rgba(47,111,237,0.35); }
        .bar-a {
            background: linear-gradient(90deg, var(--blue-deep), #4fa3ff);
            box-shadow: 0 0 16px rgba(47,111,237,0.6);
        }

        .label-b { color: var(--red); text-shadow: 0 0 12px rgba(226,56,74,0.35); }
        .bar-b {
            background: linear-gradient(90deg, var(--red-deep), #ff5c6e);
            box-shadow: 0 0 16px rgba(226,56,74,0.6);
        }

        .count {
            font-family: 'Anton', sans-serif;
            font-size: 36px;
            flex: 0 0 76px;
            text-align: right;
            text-shadow: 0 0 8px rgba(255,255,255,0.35);
        }

        .btn-reset {
            background: var(--paper);
            color: var(--ink);
            border: 2px dashed var(--gold);
            padding: 13px 30px;
            font-family: 'Special Elite', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
        }

        .btn-reset:hover {
            background-color: var(--red);
            color: #fff;
            border-color: var(--red-deep);
            box-shadow: 0 0 16px rgba(226, 56, 69, 0.5);
        }

        @media (max-width: 650px) {
            #title { font-size: 38px; white-space: normal; }
            #subtitle{ margin-bottom: 30px; }
            .label { font-size: 22px; flex: 0 0 120px; }
            .count { font-size: 26px; flex: 0 0 56px; }
            .bar-wrapper { height: 34px; margin: 0 12px; }
            .result-bar-group { padding: 16px 14px; }
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="stamp-frame">
            <img src="logo_arsenale.png" alt="Logo Arsenale delle Apparizioni">
        </div>
        <h1 id="title">Arsenale delle Apparizioni</h1>
        <h2 id="subtitle"><span class="live-dot"></span>Risultati in tempo reale</h2>

        <div class="scoreboard">
            <div class="marquee"></div>
            <div id="results-container">
                <div class="result-bar-group">
                    <span class="label label-a">Squadra Blu</span>
                    <div class="bar-wrapper">
                        <div id="barA" class="bar bar-a"></div>
                    </div>
                    <span id="countA" class="count count-a">0</span>
                </div>

                <div class="result-bar-group">
                    <span class="label label-b">Squadra Rossa</span>
                    <div class="bar-wrapper">
                        <div id="barB" class="bar bar-b"></div>
                    </div>
                    <span id="countB" class="count count-b">0</span>
                </div>
            </div>
        </div>

        <button class="btn-reset" onclick="resetVotazione()">Resetta Votazione</button>
    </div>

    <script>
        const SUPABASE_URL = "https://orzpwezibuzpchehvdkw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_uasoAypqJOLzeJAQpfU9qA__5c4SKTK";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const barA = document.getElementById("barA");
        const countA = document.getElementById("countA");
        const barB = document.getElementById("barB");
        const countB = document.getElementById("countB");

        async function caricaEInizializzaDati() {
            try {
                let { data } = await supabaseClient.from('voti_totali').select('*');
                const votoA = data.find(d => d.id === 'opzione_a')?.conteggio || 0;
                const votoB = data.find(d => d.id === 'opzione_b')?.conteggio || 0;
                const totale = votoA + votoB;

                countA.innerText = votoA;
                countB.innerText = votoB;

                const percA = totale > 0 ? (votoA / totale) * 100 : 0;
                const percB = totale > 0 ? (votoB / totale) * 100 : 0;

                barA.style.width = percA + "%";
                barB.style.width = percB + "%";

            } catch (err) {
                console.error("Errore nel caricamento dati:", err);
            }
        }

        async function resetVotazione() {
            if (confirm("Sei sicuro di voler azzerare tutti i voti dello spettacolo corrente?")) {
                try {
                    await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_a');
                    await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_b');
                    localStorage.removeItem("haVotato");
                    alert("Votazione azzerata sul palco! 🎭");
                } catch (err) {
                    console.error("Errore durante il reset:", err);
                }
            }
        }

        caricaEInizializzaDati();

        supabaseClient
            .channel('cambiamenti-voti')
            .on('postgres_changes', { event: 'UPDATE', scheme: 'public', table: 'voti_totali' }, () => {
                caricaEInizializzaDati();
            })
            .subscribe();
    </script>
</body>
</html>
